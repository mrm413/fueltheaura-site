name: Pull from BlogGuru and deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: "0 2,10,18 * * *"  # 3x/day

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4

      # Prove BLOGURU_TOKEN can read the private repo and show scopes
      - name: Diagnose PAT access
        shell: bash
        run: |
          set -euo pipefail
          echo "== GET /repos/mrm413/BlogGuru =="
          code=$(curl -sS -o resp.json -w "%{http_code}" \
            -H "Authorization: token ${{ secrets.BLOGURU_TOKEN }}" \
            -H "User-Agent: pat-diag" \
            https://api.github.com/repos/mrm413/BlogGuru)
          echo "HTTP: $code"
          echo "== Headers (scopes) =="
          curl -sSI -H "Authorization: token ${{ secrets.BLOGURU_TOKEN }}" -H "User-Agent: pat-diag" https://api.github.com/repos/mrm413/BlogGuru \
            | grep -iE 'x-oauth-scopes|x-accepted-oauth-scopes|x-github-sso|x-ratelimit-remaining' || true
          echo "== Body (first 300B) =="
          head -c 300 resp.json; echo
          test "$code" = "200"

      # Use PAT-backed git clone (avoid actions/checkout repo metadata calls)
      - name: Checkout BlogGuru (read-only)
        shell: bash
        run: |
          set -euxo pipefail
          rm -rf blogsrc
          git clone --depth=1 "https://x-access-token:${{ secrets.BLOGURU_TOKEN }}@github.com/mrm413/BlogGuru.git" blogsrc
          git -C blogsrc fetch origin main --depth=1
          git -C blogsrc checkout -q main

      - name: Prepare site
        shell: bash
        run: |
          set -euxo pipefail
          rm -rf dist && mkdir -p dist
          if [ -d "blogsrc/publish" ]; then
            cp -r blogsrc/publish/* dist/
          else
            echo "<h1>FuelTheAura — coming online</h1>" > dist/index.html
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4