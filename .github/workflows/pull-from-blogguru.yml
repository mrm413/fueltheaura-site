name: Deploy site from BlogGuru

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target repo (${{ github.repository }})
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Checkout BlogGuru (read-only)
        uses: actions/checkout@v4
        with:
          repository: mrm413/BlogGuru
          token: ${{ secrets.BLOGGURU_READ }}
          path: blogsrc
          fetch-depth: 1

      - name: Prepare site
        run: |
          set -e
          rm -rf dist && mkdir -p dist
          if [ -d "blogsrc/publish" ]; then
            cp -r blogsrc/publish/* dist/
          else
            echo "<h1>FuelTheAura — coming online</h1>" > dist/index.html
          fi

      - name: Push to gh-pages (clean; commit only from worktree)
        run: |
          set -e
          git config user.name  "pages-bot"
          git config user.email "actions@github.com"

          # create/update gh-pages worktree
          git fetch origin gh-pages || true
          rm -rf out
          git worktree add -B gh-pages out origin/gh-pages 2>/dev/null || git worktree add -B gh-pages out

          # remove any previously tracked 'blogsrc' gitlink from gh-pages
          git -C out rm -f --cached -r blogsrc 2>/dev/null || true
          rm -rf out/blogsrc 2>/dev/null || true

          # hard-clean worktree and copy site
          rm -rf out/* out/.[!.]* out/..?* || true
          rsync -a --delete dist/ out/ || { cp -r dist/* out/ 2>/dev/null || true; }

          # sanity: ensure we're on gh-pages inside worktree
          test "$(git -C out rev-parse --abbrev-ref HEAD)" = "gh-pages"

          # commit strictly from the worktree
          git -C out add -A
          git -C out commit -m "Publish from BlogGuru $(git -C blogsrc rev-parse --short HEAD)" || echo "Nothing to commit"
          git -C out push origin gh-pages