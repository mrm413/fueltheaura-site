name: Pull from BlogGuru and deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: "0 2,10,18 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4

      - name: Verify secret is present
        run: |
          set -euo pipefail
          test -n "${{ secrets.BLOGURU_TOKEN }}" || { echo "BLOGURU_TOKEN missing"; exit 1; }

      - name: Diagnose PAT access (BlogGuru)
        run: |
          set -euo pipefail
          code=$(curl -sS -o /dev/null -w "%{http_code}" \
            -H "Authorization: token ${{ secrets.BLOGURU_TOKEN }}" \
            -H "User-Agent: bloguru-pat-diag" \
            https://api.github.com/repos/mrm413/BlogGuru)
          echo "GET /repos/mrm413/BlogGuru -> HTTP $code"
          test "$code" = "200"

      - name: Checkout BlogGuru (via PAT)
        run: |
          set -euxo pipefail
          rm -rf blogsrc
          git clone --depth=1 "https://x-access-token:${{ secrets.BLOGURU_TOKEN }}@github.com/mrm413/BlogGuru.git" blogsrc
          git -C blogsrc fetch origin main --depth=1 || true
          git -C blogsrc checkout -q main || true

      - name: Import BlogGuru -> src/blog (keep structure incl. images)
        run: |
          set -euxo pipefail
          mkdir -p src/blog
          if [ -d "blogsrc/publish" ]; then
            rsync -a --delete --exclude ".git" blogsrc/publish/ src/blog/
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Autobot - ingest affiliate offers (ClickBank/AliExpress) and generate posts/products
        env:
          CLICKBANK_AFFILIATE: ${{ secrets.CLICKBANK_AFFILIATE }}
          CLICKBANK_FEED_URL: ${{ secrets.CLICKBANK_FEED_URL }}
          CLICKBANK_RAPIDAPI_KEY: ${{ secrets.CLICKBANK_RAPIDAPI_KEY }}
          CLICKBANK_RAPIDAPI_HOST: ${{ secrets.CLICKBANK_RAPIDAPI_HOST }}
          ALIEXPRESS_FEED_URL: ${{ secrets.ALIEXPRESS_FEED_URL }}
          ALIEXPRESS_RAPIDAPI_KEY: ${{ secrets.ALIEXPRESS_RAPIDAPI_KEY }}
          ALIEXPRESS_RAPIDAPI_HOST: ${{ secrets.ALIEXPRESS_RAPIDAPI_HOST }}
          COUNTRY_ALLOWLIST: ${{ secrets.COUNTRY_ALLOWLIST }}
        run: |
          set -euxo pipefail
          node scripts/autobot/run.mjs

      - name: Install deps
        run: npm install --no-audit --no-fund

      - name: Build site (Eleventy)
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4