name: Pull from BlogGuru and deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4

      - name: Checkout BlogGuru (read-only)
        uses: actions/checkout@v4
        with:
          repository: mrm413/BlogGuru
          path: blogsrc
          fetch-depth: 1

      - name: Prepare site
        run: |
          set -euxo pipefail
          rm -rf dist && mkdir -p dist
          if [ -d "blogsrc/publish" ]; then
            cp -r blogsrc/publish/* dist/
          else
            echo "<h1>FuelTheAura — coming online</h1>" > dist/index.html
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
